<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quiver Capability Explorer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%239C02FA'/%3E%3Cstop offset='0.52' stop-color='%23C20CA9'/%3E%3Cstop offset='1' stop-color='%23F51D3F'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-size='18' font-family='Poppins,Arial,sans-serif' font-weight='800' fill='white' text-anchor='middle'%3EQ%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" />
<link rel="stylesheet" href="/quiver.css" />
<script>
  /* set theme before first paint to avoid a flash; the branded variant uses its
     OWN localStorage key so its light/dark choice is independent of the main app */
  (function () {
    try {
      var s = localStorage.getItem("qx-theme-quiver");
      var t = s || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
</head>
<body>
<div class="app" id="app">

  <!-- ============ sidebar ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="side-head">
      <div class="brand">
        <div class="mark">Q</div>
        <div class="bt">
          <b id="brand-title">Capability Explorer</b>
          <span id="brand-sub">Quiver · best model per track</span>
        </div>
      </div>
      <button class="icon-btn side-close" id="side-close" type="button" aria-label="Close menu"></button>
    </div>
    <div class="side-search">
      <input id="nav-filter" type="search" placeholder="Filter tracks…   ( / )" aria-label="Filter tracks" autocomplete="off" />
    </div>
    <nav class="side-nav" id="side-nav" aria-label="Tracks"></nav>
    <div class="side-foot" id="side-foot"></div>
  </aside>

  <div class="scrim" id="scrim"></div>

  <!-- ============ main ============ -->
  <div class="main">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menu-btn" type="button" aria-label="Open menu"></button>
      <div class="crumb" id="crumb"></div>
      <div class="spacer"></div>
      <button class="search-btn" id="search-btn" type="button" aria-label="Search (Command-K)">
        <span class="sb-ic" aria-hidden="true"></span><span class="lbl">Search</span><kbd>⌘K</kbd>
      </button>
      <button class="icon-btn theme-btn" id="theme-btn" type="button" aria-label="Toggle light / dark"></button>
    </header>
    <main class="content" id="card" tabindex="-1"></main>
  </div>
</div>

<!-- ============ command palette ============ -->
<div class="palette" id="palette" hidden>
  <div class="palette-box" role="dialog" aria-modal="true" aria-label="Command palette">
    <input id="palette-input" type="text" placeholder="Jump to a track or action…" autocomplete="off" aria-label="Command palette" />
    <div class="palette-list" id="palette-list"></div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
