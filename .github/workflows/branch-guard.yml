name: branch-guard

# Server-side backstop for the branch rules. On the free plan this is DETECTIVE
# (it can't block a merge the way paid branch protection does) — but it makes any
# violation loud: a failed check on the PR, and a filed issue for a direct push to main.

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  # 1) Every PR's source branch must be <handle>/<slug>.
  pr-branch-name:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce <handle>/<slug> naming
        env:
          BR: ${{ github.head_ref }}
        run: |
          echo "PR head branch: $BR"
          if [[ ! "$BR" =~ ^(rohan|hayes|gavin)/.+ ]]; then
            echo "::error::Branch name violates the naming rule. Use <handle>/<slug> (handle in rohan|hayes|gavin)."
            exit 1
          fi
          echo "OK: branch naming valid."

  # 2) Any push to main that is NOT by the approver is flagged loudly.
  direct-push-guard:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Flag unauthorized direct push to main
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          echo "Push to main by: $ACTOR"
          # The approver (repo owner) is the only identity allowed to land commits on main.
          if [[ "$ACTOR" != "rohanaryagondi" ]]; then
            echo "::error::Unauthorized direct push to main by '$ACTOR'. main changes must go through a PR merged by the approver."
            gh issue create --repo "$REPO" \
              --title "⚠ Unauthorized direct push to main by $ACTOR" \
              --body "Commit \`$SHA\` was pushed directly to \`main\` by \`$ACTOR\`, bypassing the PR flow. Per dev/CONTRIBUTOR_RULES.md only the approver lands commits on main, and only via a merged PR. Please revert and reland through a PR." \
              || echo "(issue creation skipped)"
            exit 1
          fi
          echo "OK: push by approver."
